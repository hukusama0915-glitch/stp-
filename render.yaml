services:
  - type: web
    name: stp-time-tool
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --listen=0.0.0.0:$PORT app:app
    envVars:
      - key: UPLOAD_RETENTION_DAYS
        value: "1"
      - key: ENABLE_BREP_ANALYSIS
        value: "1"
